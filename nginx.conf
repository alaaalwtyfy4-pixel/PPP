# =============================================================================
# Agency Marketing OS — Nginx Reverse Proxy (Production + Webhook Tunneling)
# =============================================================================
#
# Architecture:
#   nginx :80  ──►  /api/webhooks/*  ──►  backend:8000  (Meta, Stripe, etc.)
#              ──►  /api/*, /docs, /redoc  ──►  backend:8000
#              ──►  /_next/static/*  ──►  frontend:3000
#              ──►  /* (all other routes)  ──►  frontend:3000
#
# Webhook Tunneling:
#   External tunnel (ngrok, localtunnel) → Nginx :80 → Backend :8000
#   Nginx accepts any Host header (server_name _;)
#   Backend receives X-Forwarded-* headers for routing verification
#
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging (structured, includes upstream timing) ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log;

    # ---- Performance tuning ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;          # webhook payloads + media uploads
    client_body_timeout 30s;
    client_header_timeout 10s;

    # ---- Gzip (CSS/JS/JSON/SVG) ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---- Upstream pools ----
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP Server
    # =========================================================================
    server {
        listen 80;
        server_name _;          # ← Accept ANY Host header (including ngrok domains)

        # -----------------------------------------------------------------
        # Security Headers (applied to ALL responses)
        # NOTE: These are safe for webhook routes. For SPA routes, 
        # you may want to adjust based on your frontend needs.
        # -----------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # -----------------------------------------------------------------
        # Favicon — silence 404 noise
        # -----------------------------------------------------------------
        location = /favicon.ico {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
            expires 7d;
        }

        # =================================================================
        # WEBHOOK ENDPOINTS (Meta, Stripe, etc.)
        # =================================================================
        # These must come BEFORE generic /api/ to take precedence
        location /api/webhooks/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # Preserve original request details for webhook signature verification
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            
            # Webhooks require tight timeouts + no buffering
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
            
            # Allow larger webhook payloads (e.g., bulk data from Meta)
            client_max_body_size 50m;
        }

        # =================================================================
        # NEXT.JS STATIC ASSETS — MUST come before `location /`
        # =================================================================
        #
        # /_next/static/ contains CSS, JS, fonts, and images with
        # content-hashed filenames (e.g. /_next/static/css/abc123.css).
        # These are IMMUTABLE — the hash changes if the file changes.
        # Setting a 1-year cache eliminates unstyled/blank layouts.
        #
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_cache_valid 200 365d;
            expires 365d;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            access_log off;
        }

        # Public assets (images, robots.txt, etc.)
        location /public/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
        }

        # =================================================================
        # BACKEND API ROUTES (non-webhook)
        # =================================================================

        # API v1
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;       # longer for insights/LLM calls
            proxy_send_timeout 30s;
            proxy_buffering off;           # streaming responses
        }

        # OpenAPI docs
        location /docs {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Health check
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        # =================================================================
        # FRONTEND — Catch-all (MUST be last)
        # =================================================================
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_buffering off;

            # If frontend is starting up, retry once after 1s
            proxy_next_upstream error timeout invalid_header http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # =================================================================
        # Error pages (avoid exposing nginx version)
        # =================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error":"Service temporarily unavailable. Please retry."}';
            add_header Content-Type application/json;
        }
    }

    # =========================================================================
    # HTTPS Server (uncomment when certs are available)
    # =========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... identical location blocks as above ...
    # }
}
